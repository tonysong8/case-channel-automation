version: '3.8'

services:
  slack-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET}
      - PORT=3000
      - DEBUG=false
      - LOG_LEVEL=INFO
      - EXTERNAL_USER_EMAIL=${EXTERNAL_USER_EMAIL:-zealias@gmail.com}
      - HIGH_PRIORITY_EMAIL=${HIGH_PRIORITY_EMAIL:-tony.song@outlook.com}
      - MEDIUM_PRIORITY_EMAIL=${MEDIUM_PRIORITY_EMAIL:-demoeng+jennifer_hynes_11880@slack-corp.com}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80" 
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - slack-app
    restart: unless-stopped
    profiles:
      - production

volumes:
  logs:
    driver: local